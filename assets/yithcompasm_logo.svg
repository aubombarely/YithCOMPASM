<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#142544"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ────────────────────────────────────────────────── -->
  <circle cx="200" cy="200" r="196" fill="#04060c"/>
  <circle cx="200" cy="200" r="185" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="192" fill="none" stroke="#2c4a72" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="#1c3252" stroke-width="0.6"/>

  <!-- ── Stars ─────────────────────────────────────────────────────── -->
  <g fill="#7fa0c9" opacity="0.55">
    <circle cx="68"  cy="82"  r="1"/>
    <circle cx="335" cy="68"  r="1.5"/>
    <circle cx="82"  cy="318" r="1"/>
    <circle cx="350" cy="310" r="1.5"/>
    <circle cx="112" cy="358" r="1"/>
    <circle cx="294" cy="363" r="1"/>
    <circle cx="52"  cy="208" r="1"/>
    <circle cx="373" cy="178" r="1"/>
    <circle cx="314" cy="46"  r="1"/>
    <circle cx="150" cy="41"  r="1.5"/>
    <circle cx="40"  cy="148" r="1"/>
    <circle cx="362" cy="248" r="1"/>
    <circle cx="170" cy="368" r="1"/>
    <circle cx="240" cy="35"  r="1"/>
  </g>

  <!-- ── Yith emblem ───────────────────────────────────────────────── -->
  <!-- Rugose cone body with a small three-eyed head; the encircling  -->
  <!-- ellipse doubles as a compass bezel, with a single north tick.  -->
  <g transform="translate(200,60)">
    <ellipse cx="0" cy="0" rx="32" ry="13"
             fill="none" stroke="#3a6089" stroke-width="1.5" opacity="0.75"/>
    <line x1="0" y1="-13" x2="0" y2="-19"
          stroke="#5c86b3" stroke-width="1.3" opacity="0.85"/>
    <text x="0" y="-22" font-family="'Courier New', Courier, monospace" font-size="7"
          fill="#5c86b3" text-anchor="middle" opacity="0.85">N</text>
    <!-- rugose cone -->
    <path d="M -11 12 Q 0 16 11 12 L 6 -4 Q 0 -7 -6 -4 Z" fill="#3a5a82"/>
    <path d="M -8 6 Q 0 9 8 6" fill="none" stroke="#5c86b3" stroke-width="0.8" opacity="0.7"/>
    <!-- three-eyed head -->
    <circle cx="-4.5" cy="-5" r="2" fill="#bcd7f0" filter="url(#glow)" opacity="0.95"/>
    <circle cx="0"    cy="-7" r="2" fill="#bcd7f0" filter="url(#glow)" opacity="0.95"/>
    <circle cx="4.5"  cy="-5" r="2" fill="#bcd7f0" filter="url(#glow)" opacity="0.95"/>
  </g>

  <!-- ── Dot-plot visualization ───────────────────────────────────── -->
  <!-- Colours: identity gradient red -> amber -> teal (low -> high);  -->
  <!-- purple = collapsed/redundant region; light blue = inversion     -->
  <!-- (drawn as the reversed diagonal, exactly as it reads on a real  -->
  <!-- dot plot).                                                      -->

  <!-- Trail A — colinear, high-identity -->
  <line x1="128" y1="132" x2="192" y2="98" stroke="#5c86b3" stroke-width="1" opacity="0.35"/>
  <circle cx="128" cy="132" r="5.5" fill="#ffcc22" filter="url(#glow)" opacity="0.85"/>
  <circle cx="149" cy="121" r="5.5" fill="#8fd0a8" filter="url(#glow)" opacity="0.85"/>
  <circle cx="171" cy="110" r="5.5" fill="#2ec8a6" filter="url(#glow)" opacity="0.9"/>
  <circle cx="192" cy="98"  r="5.5" fill="#2ec8a6" filter="url(#glow)" opacity="0.9"/>

  <!-- Trail B — colinear, lower identity, with a collapsed/redundant marker -->
  <line x1="128" y1="182" x2="192" y2="150" stroke="#5c86b3" stroke-width="1" opacity="0.35"/>
  <circle cx="128" cy="182" r="5.5" fill="#ff6a4d" filter="url(#glow)" opacity="0.85"/>
  <circle cx="149" cy="171" r="5.5" fill="#ff8f5a" filter="url(#glow)" opacity="0.85"/>
  <circle cx="171" cy="160" r="5.5" fill="#ffb347" filter="url(#glow)" opacity="0.85"/>
  <circle cx="192" cy="150" r="5.5" fill="#ffcc22" filter="url(#glow)" opacity="0.85"/>
  <circle cx="212" cy="158" r="4.5" fill="none" stroke="#9966ee" stroke-width="1.2" opacity="0.75"/>
  <circle cx="217" cy="163" r="4.5" fill="none" stroke="#9966ee" stroke-width="1.2" opacity="0.75"/>
  <polygon points="238,146 238,159 247,152" fill="#9966ee" opacity="0.70"/>

  <!-- Trail C — reversed diagonal: an inversion -->
  <line x1="128" y1="200" x2="192" y2="234" stroke="#5c86b3" stroke-width="1" opacity="0.35"/>
  <circle cx="128" cy="200" r="5.5" fill="#2ec8a6" filter="url(#glow)" opacity="0.9"/>
  <circle cx="149" cy="211" r="5.5" fill="#8fd0a8" filter="url(#glow)" opacity="0.85"/>
  <circle cx="171" cy="223" r="5.5" fill="#bcd7f0" filter="url(#glow)" opacity="0.9"/>
  <circle cx="192" cy="234" r="5.5" fill="#bcd7f0" filter="url(#glow)" opacity="0.9"/>
  <polygon points="238,197 238,210 247,203" fill="#bcd7f0" opacity="0.70"/>

  <!-- ── Colour legend ──────────────────────────────────────────────── -->
  <g font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#6f8fb3">
    <circle cx="110" cy="272" r="3.5" fill="#2ec8a6" opacity="0.85"/>
    <text x="117" y="275">high ID</text>
    <circle cx="167" cy="272" r="3.5" fill="#ff6a4d" opacity="0.85"/>
    <text x="174" y="275">low ID</text>
    <circle cx="219" cy="272" r="3.5" fill="none" stroke="#9966ee" stroke-width="1.2"/>
    <text x="226" y="275">redundant</text>
    <circle cx="288" cy="272" r="3.5" fill="#bcd7f0" opacity="0.85"/>
    <text x="295" y="275">inversion</text>
  </g>

  <!-- Separator line -->
  <line x1="105" y1="288" x2="295" y2="288"
        stroke="#1c3252" stroke-width="0.8"/>

  <!-- ── Title ──────────────────────────────────────────────────────── -->
  <text x="200" y="317"
        font-family="'Courier New', Courier, monospace"
        font-size="25"
        font-weight="bold"
        fill="#d8e4f2"
        text-anchor="middle"
        letter-spacing="1.2"
        filter="url(#textglow)">YithCOMPASM</text>

  <!-- Subtitle -->
  <text x="200" y="339"
        font-family="'Courier New', Courier, monospace"
        font-size="9.5"
        fill="#5c86b3"
        text-anchor="middle"
        letter-spacing="1.2">Align  ·  Compare  ·  Navigate</text>

</svg>
